services:

  flask1:
    image: agribot:latest

    env_file:
      - .env

    deploy:
      replicas: 3
      restart_policy:
        condition: any

  nginx:
    image: agribot-nginx:latest

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./app/static:/app/app/static

    depends_on:
      - flask1

    deploy:
      replicas: 1